services:
  lifequest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifequest
    ports:
      - "80:80"
    volumes:
      # Persistent data — survives container rebuilds
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/auth/login", "-o", "/dev/null", "-w", ""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
